{% extends "crm/base.html" %}
{% block title %}Log in - Clover CRM{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16 bg-white border border-stone-200 rounded-lg p-6">
  <h1 class="text-lg font-medium mb-4">Log in to Clover CRM</h1>
  {% if form.errors %}
  <p class="text-sm text-red-700 bg-red-50 rounded-lg px-3 py-2 mb-4">Your username and password didn't match. Try again.</p>
  {% endif %}
  <form method="post" class="space-y-3">
    {% csrf_token %}
    <div>
      <label class="block text-xs text-stone-500 mb-1" for="id_username">Username</label>
      <input type="text" name="username" id="id_username" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" autofocus>
    </div>
    <div>
      <label class="block text-xs text-stone-500 mb-1" for="id_password">Password</label>
      <input type="password" name="password" id="id_password" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <button type="submit" class="w-full bg-emerald-700 text-white text-sm rounded-lg py-2 hover:bg-emerald-800">Log in</button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>
</div>
{% endblock %}
